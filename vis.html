<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="refresh" content="0; url='https://xjasminelu.github.io/uchicago-dissertations-viz/vis/'">
  <style>
    #vis.vega-embed {
      width: 100%;
      display: flex;
    }

    #vis.vega-embed details,
    #vis.vega-embed details summary {
      position: relative;
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-lite@5.20.1"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
</head>
<body>
  <div id="vis"></div>
  <script>
    (function(vegaEmbed) {
      var spec = {"config": {"view": {"continuousWidth": 300, "continuousHeight": 300, "stroke": null}, "axisX": {"grid": false}, "axisY": {"domain": false, "offset": 10, "ticks": false}}, "data": {"url": "extended_diss.csv"}, "mark": {"type": "circle", "opacity": 0.8, "stroke": "black", "strokeOpacity": 0.4, "strokeWidth": 1}, "encoding": {"color": {"field": "Department", "type": "nominal"}, "size": {"aggregate": "count", "type": "quantitative"}, "tooltip": [{"field": "Department", "type": "nominal"}, {"field": "Degree Date", "format": "%Y", "type": "temporal"}, {"aggregate": "count", "format": "~s", "type": "quantitative"}], "x": {"field": "Degree Date", "scale": {"domain": ["1890", "2025"]}, "type": "temporal"}, "y": {"field": "Department", "sort": "-size", "type": "nominal"}}, "height": 1000, "title": {"text": "UChicago Dissertations (1890-2025)", "anchor": "start", "subtitle": "The size of the bubble represents the total dissertation count per year, by dissertation department"}, "width": 1000, "$schema": "https://vega.github.io/schema/vega-lite/v5.20.1.json"};
      var embedOpt = {"mode": "vega-lite"};

      function showError(el, error){
          el.innerHTML = ('<div style="color:red;">'
                          + '<p>JavaScript Error: ' + error.message + '</p>'
                          + "<p>This usually means there's a typo in your chart specification. "
                          + "See the javascript console for the full traceback.</p>"
                          + '</div>');
          throw error;
      }
      const el = document.getElementById('vis');
      vegaEmbed("#vis", spec, embedOpt)
        .catch(error => showError(el, error));
    })(vegaEmbed);

  </script>
</body>
</html>
